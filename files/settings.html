<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendanceIQ | Settings</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="layout-wrapper">

        <aside class="sidebar">
            <div class="logo-container">
                <i class="ri-fingerprint-line logo-icon"></i>
                <h2>AttendanceIQ</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item"><i class="ri-dashboard-line"></i> <span>Dashboard</span></a>
                <a href="employees.html" class="nav-item"><i class="ri-team-line"></i> <span>Employees</span></a>
                <a href="leave.html" class="nav-item"><i class="ri-calendar-check-line"></i> <span>Leave Requests</span></a>
                <a href="reports.html" class="nav-item"><i class="ri-file-chart-line"></i> <span>Deduction Reports</span></a>
                <a href="settings.html" class="nav-item active"><i class="ri-settings-3-line"></i> <span>Settings</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-title">
                    <h1>System Configuration</h1>
                </div>
            </header>

            <section class="data-section" style="max-width: 800px;">
                <div class="card-header"><h2>Attendance Rules</h2></div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Late Grace Period (Minutes)</label>
                        <input type="number" value="15">
                    </div>
                    <div class="form-group">
                        <label>Default Currency</label>
                        <select><option>DZD</option><option>USD</option><option>EUR</option></select>
                    </div>
                </div>

                <div class="card-header" style="margin-top: 30px;"><h2>ZKTeco Device Sync</h2></div>
                <div class="form-group">
                    <label>Primary Device IP Address</label>
                    <input type="text" placeholder="192.168.1.201">
                </div>
                <div class="form-group">
                    <label>Sync Interval (Seconds)</label>
                    <input type="number" value="30">
                </div>

                <button class="btn-primary" style="margin-top: 20px;">Save All Settings</button>
            </section>
        </main>

    </div>
</body>
</html>

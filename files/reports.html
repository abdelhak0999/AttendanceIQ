<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendanceIQ | Deduction Reports</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="layout-wrapper">

        <aside class="sidebar">
            <div class="logo-container">
                <i class="ri-fingerprint-line logo-icon"></i>
                <h2>AttendanceIQ</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item"><i class="ri-dashboard-line"></i> <span>Dashboard</span></a>
                <a href="employees.html" class="nav-item"><i class="ri-team-line"></i> <span>Employees</span></a>
                <a href="leave.html" class="nav-item"><i class="ri-calendar-check-line"></i> <span>Leave Requests</span></a>
                <a href="reports.html" class="nav-item active"><i class="ri-file-chart-line"></i> <span>Deduction Reports</span></a>
                <a href="settings.html" class="nav-item"><i class="ri-settings-3-line"></i> <span>Settings</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-title">
                    <h1>Deduction Reports</h1>
                </div>
                <div class="header-actions">
                    <input type="month" value="2026-03">
                    <button class="btn-primary">Download CSV</button>
                </div>
            </header>

            <section class="stats-grid">
                <div class="stat-card" style="border-left: 5px solid var(--danger);">
                    <div class="stat-details">
                        <h3>Total Deductions</h3>
                        <p class="stat-number">4,200 DZD</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-details">
                        <h3>Most Lateness</h3>
                        <p class="stat-number">Marketing Dept</p>
                    </div>
                </div>
            </section>

            <section class="data-section" style="margin-top: 24px;">
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Employee</th>
                                <th>Late Minutes</th>
                                <th>Deduction Amount</th>
                                <th>Lateness Score</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Karim B.</td>
                                <td>120 min</td>
                                <td>800 DZD</td>
                                <td><span style="color: var(--danger); font-weight: bold;">High (8.4)</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

    </div>
</body>
</html>

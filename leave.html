<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendanceIQ | Leave Requests</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="layout-wrapper">

        <aside class="sidebar">
            <div class="logo-container">
                <i class="ri-fingerprint-line logo-icon"></i>
                <h2>AttendanceIQ</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item"><i class="ri-dashboard-line"></i> <span>Dashboard</span></a>
                <a href="employees.html" class="nav-item"><i class="ri-team-line"></i> <span>Employees</span></a>
                <a href="leave.html" class="nav-item active"><i class="ri-calendar-check-line"></i> <span>Leave Requests</span></a>
                <a href="reports.html" class="nav-item"><i class="ri-file-chart-line"></i> <span>Deduction Reports</span></a>
                <a href="settings.html" class="nav-item"><i class="ri-settings-3-line"></i> <span>Settings</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-title">
                    <h1>Leave &amp; Absence Management</h1>
                </div>
            </header>

            <div class="grid-2">
                <section class="data-section">
                    <div class="card-header"><h2>Log New Absence</h2></div>
                    <div class="form-group">
                        <label>Select Employee</label>
                        <select><option>Search Employee...</option></select>
                    </div>
                    <div class="grid-2">
                        <div class="form-group"><label>Start Date</label><input type="date"></div>
                        <div class="form-group"><label>End Date</label><input type="date"></div>
                    </div>
                    <div class="form-group">
                        <label>Leave Type</label>
                        <select>
                            <option>Sick Leave</option>
                            <option>Annual Leave</option>
                            <option>Unpaid</option>
                        </select>
                    </div>
                    <button class="btn-primary" style="width: 100%;">Save Leave Record</button>
                </section>

                <section class="data-section">
                    <div class="card-header"><h2>Recent Records</h2></div>
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr><th>Employee</th><th>Status</th></tr>
                            </thead>
                            <tbody>
                                <tr><td>Youssef K.</td><td><span class="badge badge-success">Approved</span></td></tr>
                                <tr><td>Sarah M.</td><td><span class="badge badge-warning">Pending</span></td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>

    </div>
</body>
</html>

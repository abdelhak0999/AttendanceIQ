<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendanceIQ | Employees</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
    <div class="layout-wrapper">

        <aside class="sidebar">
            <div class="logo-container">
                <i class="ri-fingerprint-line logo-icon"></i>
                <h2>AttendanceIQ</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item"><i class="ri-dashboard-line"></i> <span>Dashboard</span></a>
                <a href="employees.html" class="nav-item active"><i class="ri-team-line"></i> <span>Employees</span></a>
                <a href="leave.html" class="nav-item"><i class="ri-calendar-check-line"></i> <span>Leave Requests</span></a>
                <a href="reports.html" class="nav-item"><i class="ri-file-chart-line"></i> <span>Deduction Reports</span></a>
                <a href="settings.html" class="nav-item"><i class="ri-settings-3-line"></i> <span>Settings</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-title">
                    <h1>Employee Directory</h1>
                    <p>Manage 154 total active employees</p>
                </div>
                <button class="btn-primary"><i class="ri-user-add-line"></i> Add Employee</button>
            </header>

            <section class="data-section">
                <div class="section-header">
                    <input type="text" placeholder="Search by name or ID..." style="width: 300px;">
                    <select style="width: 150px;">
                        <option>All Departments</option>
                        <option>Engineering</option>
                        <option>HR</option>
                    </select>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Photo</th>
                                <th>Name</th>
                                <th>ID</th>
                                <th>Department</th>
                                <th>Shift</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><div class="avatar">HA</div></td>
                                <td><strong>Hamzi Abdelhak</strong></td>
                                <td>EMP-2026-01</td>
                                <td>Automation</td>
                                <td>Morning (08:00 - 17:00)</td>
                                <td><button class="btn-secondary"><i class="ri-edit-line"></i></button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

    </div>
</body>
</html>
